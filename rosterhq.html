<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RosterHQ – Churros</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh}
.topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff;border-bottom:1px solid #e5e7eb;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.logo{font-size:15px;font-weight:600;color:#111;display:flex;align-items:center;gap:6px;margin-right:8px}
.logo span{color:#3b82f6}
.navtabs{display:flex;gap:2px;flex:1;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;border:none;background:transparent;color:#6b7280;white-space:nowrap}
.tab.on{background:#eff6ff;color:#1d4ed8;font-weight:600}
.tab svg{width:13px;height:13px;margin-right:3px;vertical-align:-2px}
.userpill{display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280;cursor:pointer;padding:5px 10px;border:1px solid #e5e7eb;border-radius:8px;background:#fff}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:#dbeafe;color:#1d4ed8;flex-shrink:0}
.nbdot{width:7px;height:7px;border-radius:50%;background:#ef4444;display:none}
.pg{display:none;padding:14px;max-width:1100px;margin:0 auto}
.pg.on{display:block}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.sec{font-size:14px;font-weight:600;color:#111;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.met{background:#f9fafb;border-radius:8px;padding:10px 12px}
.ml{font-size:11px;color:#6b7280;margin-bottom:3px}
.mv{font-size:22px;font-weight:700;color:#111}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#111;font-weight:500}
.btn:hover{background:#f9fafb}
.btn svg{width:14px;height:14px}
.btp{background:#2563eb;color:#fff;border-color:transparent}
.btp:hover{background:#1d4ed8}
.btg{background:#16a34a;color:#fff;border-color:transparent}
.btg:hover{background:#15803d}
.btd{background:#dc2626;color:#fff;border-color:transparent}
.btd:hover{background:#b91c1c}
.btw{background:#d97706;color:#fff;border-color:transparent}
.btw:hover{background:#b45309}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.sh-off{background:#f3f4f6;color:#9ca3af}
.sh-soccer{background:#fef3c7;color:#92400e}
.sh-netball{background:#e0f2fe;color:#0c4a6e}
.sh-bball{background:#f3e8ff;color:#5b21b6}
.sh-catering{background:#dcfce7;color:#14532d}
.sh-shed{background:#fee2e2;color:#7f1d1d}
.sh-other{background:#f1f5f9;color:#334155}
.rtbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.rtbl th{text-align:left;padding:6px 6px;background:#f9fafb;color:#6b7280;font-weight:600;font-size:11px;border-bottom:1px solid #e5e7eb}
.rtbl td{padding:5px 6px;border-bottom:1px solid #f3f4f6;vertical-align:middle;overflow:hidden}
.rtbl tr:hover td{background:#fafafa}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg label{font-size:11px;color:#6b7280;font-weight:500}
.fg input,.fg select,.fg textarea{padding:7px 10px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#111;font-size:13px;font-family:inherit}
.fg input:focus,.fg select:focus{outline:none;border-color:#3b82f6}
.fgrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-wrap.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.mtit{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.srow{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:7px;background:#fff}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-w{background:#22c55e}.dot-o{background:#94a3b8}.dot-b{background:#f59e0b}
.clkdisp{font-size:34px;font-weight:700;color:#111;text-align:center;margin:14px 0;font-family:monospace;letter-spacing:2px}
.pb{display:block;width:100%;padding:13px;font-size:14px;border-radius:10px;cursor:pointer;border:none;font-weight:600;margin-bottom:8px}
.pin{background:#22c55e;color:#fff}
.pout{background:#ef4444;color:#fff}
.pbrk{background:#f59e0b;color:#fff}
.hlog{max-height:160px;overflow-y:auto}
.loge{display:flex;justify-content:space-between;font-size:11px;padding:5px 0;border-bottom:1px solid #f3f4f6;color:#6b7280}
.avail-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:12px}
.avail-day{border:1px solid #d1d5db;border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;font-size:11px;transition:all .15s}
.av-yes{background:#dcfce7;border-color:#16a34a;color:#14532d}
.av-no{background:#fee2e2;border-color:#dc2626;color:#7f1d1d}
.av-maybe{background:#fef3c7;border-color:#d97706;color:#92400e}
.swap-req{padding:12px;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:8px}
.notif-item{display:flex;align-items:flex-start;gap:10px;padding:12px;border-bottom:1px solid #f3f4f6;cursor:pointer}
.notif-item.unread{background:#eff6ff}
.nicon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.mysch-day{padding:11px 14px;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;background:#fff}
.day-today{border-color:#3b82f6;background:#eff6ff}
.exp-opt{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:8px;cursor:pointer;background:#fff}
.exp-opt:hover{background:#f9fafb}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f5f5;padding:20px}
.login-box{background:#fff;border-radius:16px;padding:32px;width:100%;max-width:380px;border:1px solid #e5e7eb;text-align:center}
.pin-dots{display:flex;justify-content:center;gap:10px;margin:16px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #d1d5db;background:#fff;transition:all .15s}
.pin-dot.filled{background:#2563eb;border-color:#2563eb}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;margin:0 auto}
.numkey{padding:14px;border:1px solid #e5e7eb;border-radius:10px;font-size:18px;font-weight:600;cursor:pointer;background:#fff;color:#111;text-align:center}
.numkey:hover{background:#eff6ff;border-color:#3b82f6}
.staff-picker{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;max-height:300px;overflow-y:auto}
.staff-pick-btn{padding:10px;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;background:#fff;font-size:13px;font-weight:500;text-align:center}
.staff-pick-btn:hover{background:#eff6ff;border-color:#3b82f6}
.sync-indicator{font-size:10px;color:#22c55e;display:flex;align-items:center;gap:3px}
.sync-indicator.syncing{color:#f59e0b}
.sync-indicator.error{color:#ef4444}
@media(max-width:600px){
  .g2,.g3,.g4{grid-template-columns:1fr 1fr}
  .fgrow{grid-template-columns:1fr}
  .avail-grid{grid-template-columns:repeat(4,1fr)}
  .staff-picker{grid-template-columns:1fr 1fr 1fr}
  .navtabs .tab span{display:none}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <div style="font-size:28px;font-weight:800;color:#2563eb;margin-bottom:4px">RosterHQ</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:24px">Churros Team</div>
    <div id="login-mode-sel">
      <button class="btn btp" style="width:100%;justify-content:center;margin-bottom:10px;padding:12px" onclick="showLogin('manager')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        Manager login
      </button>
      <button class="btn btg" style="width:100%;justify-content:center;padding:12px" onclick="showLogin('staff')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Staff login
      </button>
    </div>
    <div id="login-manager" style="display:none">
      <div style="font-size:14px;font-weight:600;margin-bottom:4px">Enter manager PIN</div>
      <div style="font-size:12px;color:#6b7280;margin-bottom:12px">4-digit PIN required</div>
      <div class="pin-dots"><div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div><div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div></div>
      <div class="numpad">
        <button class="numkey" onclick="pinPress('1')">1</button>
        <button class="numkey" onclick="pinPress('2')">2</button>
        <button class="numkey" onclick="pinPress('3')">3</button>
        <button class="numkey" onclick="pinPress('4')">4</button>
        <button class="numkey" onclick="pinPress('5')">5</button>
        <button class="numkey" onclick="pinPress('6')">6</button>
        <button class="numkey" onclick="pinPress('7')">7</button>
        <button class="numkey" onclick="pinPress('8')">8</button>
        <button class="numkey" onclick="pinPress('9')">9</button>
        <button class="numkey" onclick="pinPress('back')" style="font-size:14px">⌫</button>
        <button class="numkey" onclick="pinPress('0')">0</button>
        <button class="numkey" onclick="pinPress('clear')" style="font-size:12px">Clear</button>
      </div>
      <div id="pin-err" style="color:#ef4444;font-size:12px;margin-top:8px;display:none">Incorrect PIN. Try again.</div>
      <button class="btn" style="margin-top:14px;width:100%;justify-content:center" onclick="backToModesel()">← Back</button>
    </div>
    <div id="login-staff" style="display:none">
      <div style="font-size:14px;font-weight:600;margin-bottom:4px">Who are you?</div>
      <div style="font-size:12px;color:#6b7280;margin-bottom:10px">Select your name to continue</div>
      <div class="staff-picker" id="staff-picker"></div>
      <button class="btn" style="margin-top:12px;width:100%;justify-content:center" onclick="backToModesel()">← Back</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">
<div class="topbar">
  <div class="logo">Roster<span>HQ</span> <span style="font-size:11px;color:#6b7280;font-weight:400">Churros</span></div>
  <div class="navtabs" id="navtabs"></div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="sync-indicator" id="sync-ind">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      <span id="sync-text">Live</span>
    </div>
    <div style="position:relative;cursor:pointer" onclick="showTab('notif')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      <div class="nbdot" id="nbadge"></div>
    </div>
    <div class="userpill" onclick="logout()">
      <div class="av" id="uav">??</div>
      <span id="uname">User</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
    </div>
  </div>
</div>
<div id="pages"></div>
</div>

<!-- MODALS -->
<div class="modal-wrap" id="m-edit">
  <div class="modal">
    <div class="mtit"><span id="edit-title">Edit shift</span><button class="btn" onclick="closeM('m-edit')" style="padding:4px 8px">✕</button></div>
    <div class="fgrow">
      <div class="fg"><label>Venue / Task</label><select id="e-venue"></select></div>
      <div class="fg"><label>Start time</label><input type="time" id="e-start" value="05:00"></div>
    </div>
    <div class="fgrow">
      <div class="fg"><label>End time</label><input type="time" id="e-end" value="10:00"></div>
      <div class="fg"><label>Notes</label><input id="e-notes" placeholder="Optional"></div>
    </div>
    <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px;flex-wrap:wrap">
      <button class="btn btd" onclick="removeShift()">🗑 Remove</button>
      <button class="btn" onclick="closeM('m-edit')">Cancel</button>
      <button class="btn btp" onclick="saveEdit()">✓ Save</button>
    </div>
  </div>
</div>

<div class="modal-wrap" id="m-assign">
  <div class="modal">
    <div class="mtit">Assign shift <button class="btn" onclick="closeM('m-assign')" style="padding:4px 8px">✕</button></div>
    <div class="fgrow">
      <div class="fg"><label>Staff member</label><select id="a-staff"></select></div>
      <div class="fg"><label>Day</label><select id="a-day"></select></div>
    </div>
    <div class="fgrow">
      <div class="fg"><label>Venue / Task</label><select id="a-venue"></select></div>
      <div class="fg"><label>Start time</label><input type="time" id="a-start" value="05:00"></div>
    </div>
    <div class="fgrow">
      <div class="fg"><label>End time</label><input type="time" id="a-end" value="10:00"></div>
      <div class="fg"><label>Notes</label><input id="a-notes" placeholder="Optional"></div>
    </div>
    <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px">
      <button class="btn" onclick="closeM('m-assign')">Cancel</button>
      <button class="btn btp" onclick="saveAssign()">✓ Assign</button>
    </div>
  </div>
</div>

<div class="modal-wrap" id="m-addstaff">
  <div class="modal">
    <div class="mtit">Add team member <button class="btn" onclick="closeM('m-addstaff')" style="padding:4px 8px">✕</button></div>
    <div class="fgrow">
      <div class="fg"><label>First name</label><input id="ns-first" placeholder="Charlotte"></div>
      <div class="fg"><label>Last name</label><input id="ns-last" placeholder="Smith"></div>
    </div>
    <div class="fgrow">
      <div class="fg"><label>Role</label><select id="ns-role"><option>Staff</option><option>Supervisor</option><option>Manager</option><option>Casual</option></select></div>
      <div class="fg"><label>Phone</label><input id="ns-phone" placeholder="0400 000 000"></div>
    </div>
    <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px">
      <button class="btn" onclick="closeM('m-addstaff')">Cancel</button>
      <button class="btn btp" onclick="doAddStaff()">✓ Add member</button>
    </div>
  </div>
</div>

function setSyncStatus(s) {
  const el = document.getElementById('sync-ind');
  const tx = document.getElementById('sync-text');
  if (!el) return;
  el.className = 'sync-indicator' + (s === 'syncing' ? ' syncing' : s === 'error' ? ' error' : '');
  tx.textContent = s === 'syncing' ? 'Saving...' : s === 'error' ? 'Offline' : 'Live';
}

function fbSet(path, val) {
  setSyncStatus('syncing');
  return db.ref(path).set(val).then(() => setSyncStatus('live')).catch(() => setSyncStatus('error'));
}

function fbGet(path) { return db.ref(path).once('value').then(s => s.val()); }

function addDbListener(path, cb) {
  const ref = db.ref(path);
  ref.on('value', snap => cb(snap.val()));
  dbListeners.push(ref);
}

function removeAllListeners() {
  dbListeners.forEach(r => r.off());
  dbListeners = [];
}

async function initFirebase() {
  const existing = await fbGet('staff');
  if (!existing) {
    await fbSet('staff', Object.fromEntries(DEFAULT_STAFF.map(s => [s.id, s])));
    await fbSet('roster', DEFAULT_ROSTER);
    await fbSet('swaps', {});
    await fbSet('notifications', {});
    STAFF.forEach(async (s) => {
      await fbSet('availability/' + s.id, Object.fromEntries(DAYS.map((_, i) => [i, 'yes'])));
    });
  }
}

function sc(v) {
  if (!v || v === 'OFF') return 'sh-off';
  const u = v.toUpperCase();
  if (u.includes('SOCCER')) return 'sh-soccer';
  if (u.includes('NETBALL')) return 'sh-netball';
  if (u.includes('BBALL') || u.includes('BASKETBALL')) return 'sh-bball';
  if (u.includes('CATERING')) return 'sh-catering';
  if (u.includes('SHED')) return 'sh-shed';
  return 'sh-other';
}

function venueOpts(sel) {
  return VENUES.map(v => `<option${sel===v?' selected':''}>${v}</option>`).join('');
}

function esc(s) { return (s||'').replace(/'/g, '&#39;'); }

function buildNav() {
  const tabs = mode === 'manager' ? MANAGER_TABS : STAFF_TABS;
  document.getElementById('navtabs').innerHTML = tabs.map(t =>
    `<button class="tab" id="tab-${t.id}" onclick="showTab('${t.id}')">${t.label}</button>`
  ).join('');
  updateNotifBadge();
}

function showTab(id) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  const t = document.getElementById('tab-' + id);
  if (t) t.classList.add('on');
  const pg = document.getElementById('pages');
  pg.innerHTML = '';
  if (id === 'roster') renderRoster();
  else if (id === 'staff') renderStaff();
  else if (id === 'swap' || id === 'myswap') renderSwap();
  else if (id === 'reports') renderReports();
  else if (id === 'export') renderExport();
  else if (id === 'notif') renderNotif();
  else if (id === 'timeclock') renderTimeClock();
  else if (id === 'avail') renderAvail();
  else if (id === 'mysch') renderMySchedule();

function doAddStaff() {
  const f = document.getElementById('ns-first').value.trim();
  const l = document.getElementById('ns-last').value.trim();
  const r = document.getElementById('ns-role').value;
  const p = document.getElementById('ns-phone').value.trim();
  if (!f) return alert('Please enter a first name.');
  const id = 's' + Date.now();
  const member = {id, name: f + (l ? ' ' + l : ''), role: r, phone: p, status: 'off'};
  STAFF.push(member);
  ROSTER[id] = {};
  availability[id] = Object.fromEntries(DAYS.map((_, i) => [i, 'yes']));
  fbSet('staff/' + id, member);
  fbSet('roster/' + id, {});
  fbSet('availability/' + id, Object.fromEntries(DAYS.map((_, i) => [i, 'yes'])));
  addNotification('👤', `${member.name} added to the team`);
  closeM('m-addstaff');
  renderStaff();
}

function removeMember(sid) {
  if (!confirm('Remove this team member?')) return;
  const i = STAFF.findIndex(s => s.id === sid);
  if (i > -1) {
    db.ref('staff/' + sid).remove();
    db.ref('roster/' + sid).remove();
    STAFF.splice(i, 1);
    delete ROSTER[sid];
  }
  renderStaff();
}

function approveSwap(id) {
  const r = swapRequests.find(x => x.id === id);
  if (r) {
    r.status = 'approved';
    fbSet('swaps/' + id + '/status', 'approved');
    const fromStaff = STAFF.find(s => s.id === r.fromId);
    const toStaff = STAFF.find(s => s.id === r.toId);
    if (fromStaff && toStaff) {
      const di = DAYS.indexOf(r.day);
      const fromShift = ROSTER[r.fromId] && ROSTER[r.fromId][di] || 'OFF';
      const toShift = ROSTER[r.toId] && ROSTER[r.toId][di] || 'OFF';
      if (!ROSTER[r.fromId]) ROSTER[r.fromId] = {};
      if (!ROSTER[r.toId]) ROSTER[r.toId] = {};
      ROSTER[r.fromId][di] = toShift;
      ROSTER[r.toId][di] = fromShift;
      fbSet(`roster/${r.fromId}/${di}`, toShift);
      fbSet(`roster/${r.toId}/${di}`, fromShift);
    }
    addNotification('✅', `Swap approved: ${r.from} ↔ ${r.to} on ${r.day}`);
  }
  renderSwap();
}

function denySwap(id) {
  const r = swapRequests.find(x => x.id === id);
  if (r) { r.status = 'denied'; fbSet('swaps/' + id + '/status', 'denied'); }
  renderSwap();
}

function submitSwap() {
  const day = document.getElementById('sw-day').value;
  const di = DAYS.indexOf(day);
  const cs = STAFF.find(s => s.id === currentStaffId);
  const myShift = (ROSTER[currentStaffId] && ROSTER[currentStaffId][di]) || 'OFF';
  const toId = document.getElementById('sw-with').value;
  const toStaff = STAFF.find(s => s.id === toId);
  const reason = document.getElementById('sw-reason').value;
  const id = 'sw' + Date.now();
  const req = {id, fromId: currentStaffId, from: cs.name, toId, to: toStaff.name, day, shift: myShift, reason, status: 'pending', ts: new Date().toLocaleTimeString()};
  swapRequests.unshift(req);
  fbSet('swaps/' + id, req);
  addNotification('🔄', `${cs.name} requested a swap with ${toStaff.name} for ${DS[di]}`);
  renderSwap();
}

      total++; staffed.add(s.id);

      venues[k] = (venues[k] || 0) + 1;

      <div class="met"><div class="ml">Staff rostered</div><div class="mv">${staffed.size}</div></div>
      <div class="met"><div class="ml">Days off</div><div class="mv">${offC}</div></div>
      <div class="met"><div class="ml">Team size</div><div class="mv">${STAFF.length}</div></div>
    </div>
    <div class="g2">
      <div class="card"><div class="sec">Shifts by venue</div>${vRows}</div>
      <div class="card"><div class="sec">Shifts per staff member</div>${sRows}</div>
    </div>
    <div class="card"><div class="sec">Staff per day</div><div style="display:flex;gap:6px">${dayBars}</div></div>
  `);
}

function renderExport() {
  const opts = [
    {icon:'📊',label:'Export as CSV (Excel/Sheets)',sub:'Download roster as spreadsheet',action:"exportCSV()"},
    {icon:'📱',label:'Send SMS reminders',sub:'Text each staff member their shift details',action:"sendSMS()"},
    {icon:'📧',label:'Email roster to team',sub:'Send formatted roster email to all staff',action:"alert('Email integration requires a mail service like SendGrid. Contact your developer.')"},
    {icon:'🔗',label:'Copy shareable link',sub:'Share the app URL with your team',action:"copyLink()"},
    {icon:'🖨️',label:'Print roster',sub:'Print-friendly full roster view',action:"window.print()"},
  ];
  page(`
    <div class="sec">Export & share</div>
    <div class="card" style="background:#eff6ff;border-color:#bfdbfe">
      <div style="font-size:13px;font-weight:600;color:#1d4ed8;margin-bottom:4px">🌐 Your app URL</div>
      <div style="font-size:12px;color:#1d4ed8;word-break:break-all" id="app-url">${window.location.href}</div>
      <button class="btn btp" style="margin-top:8px;font-size:12px" onclick="copyLink()">Copy link</button>
    </div>
    ${opts.map(o => `
      <div class="exp-opt" onclick="${o.action}">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:36px;height:36px;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:18px">${o.icon}</div>
          <div>
            <div style="font-size:13px;font-weight:600">${o.label}</div>
            <div style="font-size:11px;color:#6b7280">${o.sub}</div>
          </div>
        </div>
        <span style="color:#9ca3af">›</span>
      </div>`).join('')}
  `);
}

function exportCSV() {
  const rows = [['Staff', 'Role', ...DS]];
  STAFF.forEach(s => {
    rows.push([s.name, s.role, ...DAYS.map((_, di) => (ROSTER[s.id] && ROSTER[s.id][di]) || 'OFF')]);
  });
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'roster_churros_18-24may.csv';
  a.click();
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => alert('✅ Link copied! Share it with your team.')).catch(() => {
    prompt('Copy this link:', window.location.href);
  });
}

function addNotification(icon, text) {
  const n = {id: 'n' + Date.now(), icon, text, time: new Date().toLocaleTimeString(), read: false};
  notifications.unshift(n);
  fbSet('notifications/' + n.id, n);
  updateNotifBadge();
}

function updateNotifBadge() {
  const unread = notifications.filter(n => !n.read).length;
  const badge = document.getElementById('nbadge');
  if (badge) badge.style.display = unread ? 'block' : 'none';
}

function renderNotif() {
  const rows = notifications.slice(0, 20).map(n => `
    <div class="notif-item ${n.read ? '' : 'unread'}" onclick="markRead('${n.id}')">
      <div class="nicon" style="background:#f3f4f6;font-size:16px">${n.icon}</div>
      <div style="flex:1">
        <div style="font-size:12px">${n.text}</div>
        <div style="font-size:11px;color:#9ca3af;margin-top:2px">${n.time}</div>
      </div>
      ${!n.read ? '<div style="width:7px;height:7px;border-radius:50%;background:#3b82f6;flex-shrink:0;margin-top:4px"></div>' : ''}
    </div>`).join('');
  page(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span class="sec" style="margin:0">Notifications</span>
      <button class="btn" onclick="markAllRead()" style="font-size:11px">Mark all read</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      ${rows || '<div style="padding:14px;font-size:12px;color:#9ca3af">No notifications yet.</div>'}
    </div>
  `);
}

function markRead(id) {
  const n = notifications.find(x => x.id === id);
  if (n) { n.read = true; fbSet('notifications/' + id + '/read', true); }
  updateNotifBadge(); renderNotif();
}

function markAllRead() {
  notifications.forEach(n => { n.read = true; fbSet('notifications/' + n.id + '/read', true); });
  updateNotifBadge(); renderNotif();
}

function renderTimeClock() {
  const cs = STAFF.find(s => s.id === currentStaffId);
  if (!cs) return;
  const myShifts = DAYS.map((d, di) => ({d, shift: (ROSTER[currentStaffId] && ROSTER[currentStaffId][di]) || 'OFF'})).filter(x => x.shift !== 'OFF');
  const shiftRows = myShifts.map(x =>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#f9fafb;border-radius:8px;margin-bottom:6px;font-size:12px">
      <span style="font-weight:500">${x.d}</span><span class="badge ${sc(x.shift)}">${x.shift}</span>
    </div>`).join('');
  const logRows = clockLog.slice().reverse().map(e =>
    `<div class="loge"><span>${e.type}</span><span>${e.time}${e.hrs ? ' (' + e.hrs + 'h)' : ''}</span></div>`).join('');

  page(`
    <div class="g2">
      <div>
        <div class="card" style="text-align:center">
          <div style="font-size:12px;color:#6b7280;margin-bottom:2px">Current time</div>
          <div class="clkdisp" id="lclk">--:--:--</div>
          <div style="font-size:12px;color:#6b7280;margin-bottom:12px" id="ldate"></div>
          <div style="font-size:12px;color:#6b7280;margin-bottom:12px" id="clkstat">${clockedIn ? (onBreak ? '⏸ On break' : '✅ Clocked in') + ' since ' + (clockInTime ? clockInTime.toLocaleTimeString() : '') : '⭕ Not clocked in'}</div>
          <button class="pb ${clockedIn ? 'pout' : 'pin'}" id="pbtn" onclick="punch()">${clockedIn ? '🔴 Clock Out' : '🟢 Clock In'}</button>
          <button class="pb pbrk" id="brkbtn" onclick="punchBreak()" style="display:${clockedIn ? 'block' : 'none'}">${onBreak ? '▶ End Break' : '⏸ Start Break'}</button>
        </div>
        <div class="g2" style="grid-template-columns:1fr 1fr">
          <div class="met"><div class="ml">Hours this week</div><div class="mv">${parseFloat(weekHours).toFixed(1)}</div></div>
          <div class="met"><div class="ml">Shifts done</div><div class="mv">${weekShifts}</div></div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="sec">My shifts this week</div>
          ${shiftRows || '<div style="font-size:12px;color:#9ca3af">No shifts this week.</div>'}
        </div>
        <div class="card">
          <div class="sec">Clock log</div>
          <div class="hlog">${logRows || '<div style="font-size:12px;color:#9ca3af">No entries yet.</div>'}</div>
        </div>
      </div>
    </div>
  `);
  updateClock();
}

function updateClock() {
  const lc = document.getElementById('lclk');
  const ld = document.getElementById('ldate');
  if (!lc) { if (clkTimer) clearTimeout(clkTimer); return; }
  const now = new Date();
  lc.textContent = now.toLocaleTimeString();
  if (ld) ld.textContent = now.toLocaleDateString('en-AU', {weekday:'long', day:'numeric', month:'long'});
  clkTimer = setTimeout(updateClock, 1000);
}

function punch() {
  if (!clockedIn) {
    clockedIn = true; onBreak = false; clockInTime = new Date();
    const cs = STAFF.find(s => s.id === currentStaffId);
    if (cs) cs.status = 'working';
    fbSet('staff/' + currentStaffId + '/status', 'working');
    clockLog.push({type: '🟢 Clock in', time: clockInTime.toLocaleTimeString()});
    fbSet('clocklog/' + currentStaffId + '/' + Date.now(), {type:'Clock in', time:clockInTime.toISOString()});
    weekShifts++;
  } else {
    const now = new Date();
    const hrs = ((now - clockInTime) / 3600000).toFixed(2);
    weekHours = (parseFloat(weekHours) + parseFloat(hrs)).toFixed(2);
    clockedIn = false; onBreak = false;
    const cs = STAFF.find(s => s.id === currentStaffId);
    if (cs) cs.status = 'off';
    fbSet('staff/' + currentStaffId + '/status', 'off');
    clockLog.push({type: '🔴 Clock out', time: now.toLocaleTimeString(), hrs});
    fbSet('clocklog/' + currentStaffId + '/' + Date.now(), {type:'Clock out', time:now.toISOString(), hours:hrs});
  }
  renderTimeClock();
}

function punchBreak() {
  onBreak = !onBreak;
  const cs = STAFF.find(s => s.id === currentStaffId);
  if (cs) cs.status = onBreak ? 'break' : 'working';
  fbSet('staff/' + currentStaffId + '/status', onBreak ? 'break' : 'working');
  clockLog.push({type: onBreak ? '⏸ Break start' : '▶ Break end', time: new Date().toLocaleTimeString()});
  renderTimeClock();
}

function renderAvail() {
  const av = availability[currentStaffId] || {};
  const days = DS.map((d, i) => {
    const val = av[i] || 'yes';
    return `<div class="avail-day av-${val}" onclick="cycleAvail(${i})" id="av-${i}">
      <div style="font-weight:600;font-size:12px">${d.split(' ')[0]}</div>
      <div style="font-size:10px;margin-top:2px">${d.split(' ')[1]}</div>
      <div style="margin-top:5px;font-size:10px">${val === 'yes' ? '✅' : val === 'no' ? '❌' : '⚠️'}</div>
    </div>`;
  }).join('');
  page(`
    <div class="sec">My availability — week of 18–24 May</div>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;font-size:12px">
      <span style="padding:3px 10px;background:#dcfce7;border:1px solid #16a34a;color:#14532d;border-radius:6px">✅ Available</span>
      <span style="padding:3px 10px;background:#fef3c7;border:1px solid #d97706;color:#92400e;border-radius:6px">⚠️ Maybe</span>
      <span style="padding:3px 10px;background:#fee2e2;border:1px solid #dc2626;color:#7f1d1d;border-radius:6px">❌ Unavailable</span>
      <span style="color:#9ca3af;align-self:center;font-size:11px">Tap a day to cycle through options</span>
    </div>
    <div class="avail-grid">${days}</div>
    <div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap">
      <button class="btn btg" onclick="saveAvail()">✓ Save & send to manager</button>
      <button class="btn" onclick="setAllAvail('yes')">All available</button>
      <button class="btn btd" onclick="setAllAvail('no')">All unavailable</button>
    </div>
    <div class="card" style="margin-top:12px">
      <div class="sec">Additional notes</div>
      <div class="fg"><textarea id="av-notes" placeholder="Any notes for your manager (time restrictions, medical, etc.)..." style="min-height:80px;resize:vertical"></textarea></div>
      <button class="btn btp" onclick="saveAvail()">📤 Submit to manager</button>
    </div>
  `);
}

function cycleAvail(i) {
  if (!availability[currentStaffId]) availability[currentStaffId] = {};
  const cycle = {yes: 'maybe', maybe: 'no', no: 'yes'};
  const cur = availability[currentStaffId][i] || 'yes';
  availability[currentStaffId][i] = cycle[cur];
  renderAvail();
}

function setAllAvail(val) {
  if (!availability[currentStaffId]) availability[currentStaffId] = {};
  DAYS.forEach((_, i) => { availability[currentStaffId][i] = val; });
  renderAvail();
}

function saveAvail() {
  fbSet('availability/' + currentStaffId, availability[currentStaffId]);
  addNotification('📅', 'Availability submitted to manager');
  alert('✅ Availability saved and sent to your manager!');
}

function renderMySchedule() {
  const cs = STAFF.find(s => s.id === currentStaffId);
  if (!cs) return;
  const today = new Date().getDay();
  const dayMap = {1:0,2:1,3:2,4:3,5:4,6:5,0:6};
  const todayIdx = dayMap[today] !== undefined ? dayMap[today] : -1;
  const shifts = Object.values(ROSTER[currentStaffId] || {}).filter(v => v && v !== 'OFF').length;
  const venues = [...new Set(Object.values(ROSTER[currentStaffId] || {}).filter(v => v && v !== 'OFF').map(v => v.replace(/\s+[\d:.\-\/]+.*/,'').trim()))];

  const rows = DAYS.map((d, di) => {
    const v = (ROSTER[currentStaffId] && ROSTER[currentStaffId][di]) || 'OFF';
    const isToday = di === todayIdx;
    return `<div class="mysch-day ${isToday ? 'day-today' : ''}">
      <div>
        <div style="font-size:13px;font-weight:600;${isToday ? 'color:#1d4ed8' : ''}">${d}${isToday ? ' · Today' : ''}</div>
        ${v !== 'OFF' ? `<div style="font-size:11px;color:#6b7280;margin-top:2px">Tap ＋ to add to calendar</div>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge ${sc(v)}">${v}</span>
        ${v !== 'OFF' ? `<button class="btn" style="padding:4px 8px;font-size:11px" onclick="alert('In the live app, this adds your shift to your phone calendar!')">＋</button>` : ''}
      </div>
    </div>`;
  }).join('');

  page(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="av" style="width:42px;height:42px;font-size:15px">${cs.name.slice(0,2).toUpperCase()}</div>
      <div>
        <div style="font-size:16px;font-weight:700">${cs.name}</div>
        <div style="font-size:12px;color:#6b7280">${cs.role} · ${shifts} shifts this week</div>
      </div>
      <div style="margin-left:auto">
        <button class="btn" onclick="exportMyCal()" style="font-size:12px">⬇ Export my shifts</button>
      </div>
    </div>
    <div class="g3" style="margin-bottom:14px">
      <div class="met"><div class="ml">Shifts this week</div><div class="mv">${shifts}</div></div>
      <div class="met"><div class="ml">Days off</div><div class="mv">${7 - shifts}</div></div>
      <div class="met"><div class="ml">Venues</div><div class="mv">${venues.length}</div></div>
    </div>
    <div class="sec">My week at a glance</div>
    ${rows}
    <div style="margin-top:10px;padding:10px 12px;background:#eff6ff;border-radius:8px;font-size:12px;color:#1d4ed8">
      ℹ️ Your roster is managed by your supervisor. To request changes, use the Swap Shifts tab.
    </div>
  `);
}

function exportMyCal() {
  const cs = STAFF.find(s => s.id === currentStaffId);
  const lines = DAYS.map((d, di) => `${d}: ${(ROSTER[currentStaffId] && ROSTER[currentStaffId][di]) || 'OFF'}`).join('\n');
  const blob = new Blob([`${cs.name}'s Roster\nWeek of 18 May – 24 May\n\n${lines}`], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${cs.name.toLowerCase().replace(' ','-')}-roster.txt`;
  a.click();
}

let pinEntry = '';
function showLogin(t) {
  document.getElementById('login-mode-sel').style.display = 'none';
  document.getElementById('login-manager').style.display = t === 'manager' ? 'block' : 'none';
  document.getElementById('login-staff').style.display = t === 'staff' ? 'block' : 'none';
  if (t === 'staff') buildStaffPicker();
}

function buildStaffPicker() {
  document.getElementById('staff-picker').innerHTML = STAFF.map(s =>
    `<button class="staff-pick-btn" onclick="loginAsStaff('${s.id}')">${s.name}</button>`
  ).join('');
}

function backToModesel() {
  pinEntry = '';
  updatePinDots();
  document.getElementById('pin-err').style.display = 'none';
  document.getElementById('login-mode-sel').style.display = 'block';
  document.getElementById('login-manager').style.display = 'none';
  document.getElementById('login-staff').style.display = 'none';
}

function pinPress(k) {
  if (k === 'back') { pinEntry = pinEntry.slice(0,-1); }
  else if (k === 'clear') { pinEntry = ''; }
  else if (pinEntry.length < 4) { pinEntry += k; }
  updatePinDots();
  document.getElementById('pin-err').style.display = 'none';
  if (pinEntry.length === 4) {
    if (pinEntry === MANAGER_PIN) {
      mode = 'manager';
      currentStaffId = '';
      enterApp();
    } else {
      document.getElementById('pin-err').style.display = 'block';
      pinEntry = '';
      updatePinDots();
    }
  }
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('pd' + i);
    if (dot) dot.className = 'pin-dot' + (i < pinEntry.length ? ' filled' : '');
  }
}

function loginAsStaff(id) {
  mode = 'staff';
  currentStaffId = id;
  enterApp();
}

function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  const cs = mode === 'manager' ? {name:'Manager'} : STAFF.find(s => s.id === currentStaffId);
  document.getElementById('uav').textContent = mode === 'manager' ? 'MG' : cs.name.slice(0,2).toUpperCase();
  document.getElementById('uname').textContent = mode === 'manager' ? 'Manager' : cs.name;
  buildNav();
  showTab(mode === 'manager' ? 'roster' : 'mysch');
  startListeners();
}

function logout() {
  if (clkTimer) clearTimeout(clkTimer);
  removeAllListeners();
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  backToModesel();
}

function startListeners() {
  addDbListener('staff', val => {
    if (val) {
      STAFF = Object.values(val);
      STAFF.sort((a,b) => a.name.localeCompare(b.name));
    }
    updateNotifBadge();
  });
  addDbListener('roster', val => { if (val) ROSTER = val; });
  addDbListener('availability', val => { if (val) availability = val; });
  addDbListener('swaps', val => { swapRequests = val ? Object.values(val).sort((a,b) => b.id.localeCompare(a.id)) : []; });
  addDbListener('notifications', val => {
    notifications = val ? Object.values(val).sort((a,b) => b.id.localeCompare(a.id)) : [];
    updateNotifBadge();
  });
}

async function boot() {
  STAFF = DEFAULT_STAFF.slice();
  ROSTER = JSON.parse(JSON.stringify(DEFAULT_ROSTER));
  await initFirebase();
  buildStaffPicker();
}

boot();
</script>
</body>
</html>
