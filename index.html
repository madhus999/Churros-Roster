<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh}
.topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff;border-bottom:1px solid #e5e7eb;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.logo{font-size:16px;font-weight:800;color:#2563eb;margin-right:8px}
.navtabs{display:flex;gap:2px;flex:1;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;border:none;background:transparent;color:#6b7280}
.tab.on{background:#eff6ff;color:#1d4ed8;font-weight:600}
.userpill{display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280;cursor:pointer;padding:5px 10px;border:1px solid #e5e7eb;border-radius:8px}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:#dbeafe;color:#1d4ed8;flex-shrink:0}
.pg{display:none;padding:14px;max-width:1100px;margin:0 auto}
.pg.on{display:block}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.sec{font-size:14px;font-weight:600;color:#111;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.met{background:#f9fafb;border-radius:8px;padding:10px 12px}
.ml{font-size:11px;color:#6b7280;margin-bottom:3px}
.mv{font-size:22px;font-weight:700;color:#111}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#111;font-weight:500}
.btn:hover{background:#f9fafb}
.btp{background:#2563eb;color:#fff;border-color:transparent}
.btg{background:#16a34a;color:#fff;border-color:transparent}
.btd{background:#dc2626;color:#fff;border-color:transparent}
.btw{background:#d97706;color:#fff;border-color:transparent}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.sh-off{background:#f3f4f6;color:#9ca3af}
.sh-soccer{background:#fef3c7;color:#92400e}
.sh-netball{background:#e0f2fe;color:#0c4a6e}
.sh-bball{background:#f3e8ff;color:#5b21b6}
.sh-catering{background:#dcfce7;color:#14532d}
.sh-shed{background:#fee2e2;color:#7f1d1d}
.sh-other{background:#f1f5f9;color:#334155}
.rtbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.rtbl th{text-align:left;padding:6px;background:#f9fafb;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb}
.rtbl td{padding:5px 6px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.rtbl tr:hover td{background:#fafafa}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg label{font-size:11px;color:#6b7280;font-weight:500}
.fg input,.fg select,.fg textarea{padding:7px 10px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#111;font-size:13px;font-family:inherit}
.fgrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mwrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:16px}
.mwrap.open{display:flex}
.mbox{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.mtit{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.srow{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:7px;background:#fff;flex-wrap:wrap;gap:8px}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-w{background:#22c55e}.dot-o{background:#94a3b8}.dot-b{background:#f59e0b}
.clkdisp{font-size:34px;font-weight:700;color:#111;text-align:center;margin:14px 0;font-family:monospace}
.pb{display:block;width:100%;padding:13px;font-size:14px;border-radius:10px;cursor:pointer;border:none;font-weight:600;margin-bottom:8px}
.pcin{background:#22c55e;color:#fff}
.pcout{background:#ef4444;color:#fff}
.pbrk{background:#f59e0b;color:#fff}
.hlog{max-height:160px;overflow-y:auto}
.loge{display:flex;justify-content:space-between;font-size:11px;padding:5px 0;border-bottom:1px solid #f3f4f6;color:#6b7280}
.avday{border:1px solid #d1d5db;border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;font-size:11px}
.av-yes{background:#dcfce7;border-color:#16a34a;color:#14532d}
.av-no{background:#fee2e2;border-color:#dc2626;color:#7f1d1d}
.av-maybe{background:#fef3c7;border-color:#d97706;color:#92400e}
.avgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:12px}
.sreq{padding:12px;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:8px}
.nitem{display:flex;align-items:flex-start;gap:10px;padding:12px;border-bottom:1px solid #f3f4f6;cursor:pointer}
.nitem.unread{background:#eff6ff}
.schday{padding:11px 14px;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;background:#fff}
.today{border-color:#3b82f6;background:#eff6ff}
.eopt{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:8px;cursor:pointer;background:#fff}
.eopt:hover{background:#f9fafb}
.lscrn{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f5f5;padding:20px}
.lbox{background:#fff;border-radius:16px;padding:32px;width:100%;max-width:380px;border:1px solid #e5e7eb;text-align:center}
.pdots{display:flex;justify-content:center;gap:10px;margin:16px 0}
.pdot{width:14px;height:14px;border-radius:50%;border:2px solid #d1d5db;background:#fff}
.pdot.filled{background:#2563eb;border-color:#2563eb}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;margin:0 auto}
.nkey{padding:14px;border:1px solid #e5e7eb;border-radius:10px;font-size:18px;font-weight:600;cursor:pointer;background:#fff;color:#111;text-align:center}
.nkey:hover{background:#eff6ff;border-color:#3b82f6}
.spkr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;max-height:320px;overflow-y:auto}
.spkbtn{padding:10px;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;background:#fff;font-size:13px;font-weight:500;text-align:center}
.spkbtn:hover{background:#eff6ff;border-color:#3b82f6}
.nbdot{width:7px;height:7px;border-radius:50%;background:#ef4444;display:none;position:absolute;top:-2px;right:-2px}

</div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="logo">RosterHQ</div>

<div class="mwrap" id="m-edit">

      <button class="btn btp" onclick="svEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Assign Shift Modal -->
<div class="mwrap" id="m-assign">

</div>

<!-- Add Staff Modal -->
<div class="mwrap" id="m-add">

    <div class="mtit">Add member <button class="btn" onclick="cm('m-add')">X</button></div>

      <div class="fg"><label>Last name</label><input id="ns-l" placeholder="Smith"></div>

    <div class="fgrow">

      <div class="fg"><label>Phone</label><input id="ns-p" placeholder="0400 000 000"></div>
    </div>
    <div class="fg"><label>Email</label><input id="ns-e" type="email" placeholder="staff@email.com"></div>
    <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px">
      <button class="btn" onclick="cm('m-add')">Cancel</button>
      <button class="btn btp" onclick="doAdd()">Add</button>
    </div>
  </div>
</div>

<!-- Edit Staff Modal -->

      <button class="btn btp" onclick="svEds()">Save</button>
    </div>
  </div>
</div>

<!-- Camera Modal -->

    <div class="mtit"><span id="camtit">Take photo to Clock In</span><button class="btn" onclick="cancelCam()">X</button></div>

    <canvas id="camcvs" style="display:none"></canvas>
    <div id="camprev" style="display:none;margin-bottom:12px">

    </div>
    <div id="cambtns">
      <button class="btn btp" style="width:100%;justify-content:center;padding:12px;margin-bottom:8px" onclick="takePic()">Take Photo</button>
    </div>
    <div id="camconf" style="display:none">
      <div style="display:flex;gap:8px">
        <button class="btn" style="flex:1;justify-content:center" onclick="retakePic()">Retake</button>
        <button class="btn btp" style="flex:1;justify-content:center" onclick="confirmCam()">Confirm</button>
      </div>
    </div>
    <div id="camerr" style="display:none;padding:10px;background:#fee2e2;border-radius:8px;font-size:12px;color:#7f1d1d;margin-top:8px">
      Camera not available.
      <button class="btn" style="width:100%;justify-content:center;margin-top:8px" onclick="skipCam()">Continue without photo</button>
    </div>
  </div>
</div>

function fbr(path){return fetch(DB+"/"+path+".json").then(function(r){return r.json();}).catch(function(){return null;});}
function fbw(path,val){fetch(DB+"/"+path+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(val)}).catch(function(){});}
function fbd(path){fetch(DB+"/"+path+".json",{method:"DELETE"}).catch(function(){});}

function sc(v){
  if(!v||v==="OFF")return "sh-off";
  var u=v.toUpperCase();
  if(u.indexOf("SOCCER")>=0)return "sh-soccer";
  if(u.indexOf("NETBALL")>=0)return "sh-netball";
  if(u.indexOf("BBALL")>=0||u.indexOf("BASKETBALL")>=0)return "sh-bball";
  if(u.indexOf("CATERING")>=0)return "sh-catering";
  if(u.indexOf("SHED")>=0)return "sh-shed";
  return "sh-other";
}

function boot(){
  STAFF=JSON.parse(JSON.stringify(DS0));
  ROSTER=JSON.parse(JSON.stringify(DR));
  showL();
  fbr("staff").then(function(d){
    if(d===null){
      var so={};DS0.forEach(function(s){so[s.id]=s;});
      fbw("staff",so);fbw("roster",DR);fbw("swaps",{});fbw("notifications",{});
      var ao={};DS0.forEach(function(s){var x={};DAYS.forEach(function(_,i){x[i]="yes";});ao[s.id]=x;});
      fbw("availability",ao);
      setCStat(true);
    } else {
      STAFF=Object.values(d).sort(function(a,b){return a.name.localeCompare(b.name);});
      Promise.all([fbr("roster"),fbr("availability"),fbr("swaps"),fbr("notifications")]).then(function(res){
        if(res[0])ROSTER=res[0];
        if(res[1])avail=res[1];
        if(res[2])swaps=Object.values(res[2]).sort(function(a,b){return b.id.localeCompare(a.id);});
        if(res[3])notifs=Object.values(res[3]).sort(function(a,b){return b.id.localeCompare(a.id);});
        setCStat(true);
        buildPkr();
        startPoll();
      });
    }
  }).catch(function(){setCStat(false);});
}

function setCStat(ok){

}

function startPoll(){
  setInterval(function(){
    fbr("staff").then(function(d){if(d)STAFF=Object.values(d).sort(function(a,b){return a.name.localeCompare(b.name);});});
    fbr("roster").then(function(d){if(d)ROSTER=d;});
    fbr("availability").then(function(d){if(d)avail=d;});
    fbr("swaps").then(function(d){if(d)swaps=Object.values(d).sort(function(a,b){return b.id.localeCompare(a.id);});});
    fbr("notifications").then(function(d){
      if(d){notifs=Object.values(d).sort(function(a,b){return b.id.localeCompare(a.id);});updNB();}
    });
  },6000);
}

function sendEmails(staffList){
  if(typeof emailjs==="undefined"){alert("Email service loading, try again in a moment.");return;}
  emailjs.init(EJS_KEY);
  var sent=0,failed=0;
  var promises=staffList.map(function(s){
    var shifts=DAYS.map(function(d,di){return d+": "+((ROSTER[s.id]&&ROSTER[s.id][di])||"OFF");}).join("\n");
    return emailjs.send(EJS_SVC,EJS_TPL,{to_email:s.email,to_name:s.name,my_shifts:shifts}).then(function(){sent++;}).catch(function(){failed++;});
  });
  Promise.all(promises).then(function(){
    addN("Emails sent: "+sent+" ok"+(failed>0?", "+failed+" failed":""));
    alert("Done! "+sent+" email(s) sent"+(failed>0?"\n"+failed+" failed":"")+".");
  });
}

function apSwap(id){
  var r=swaps.find(function(x){return x.id===id;});if(!r)return;
  r.status="approved";fbw("swaps/"+id+"/status","approved");
  var di=DAYS.indexOf(r.day);
  var fs=(ROSTER[r.fromId]&&ROSTER[r.fromId][di])||"OFF";
  var ts=(ROSTER[r.toId]&&ROSTER[r.toId][di])||"OFF";
  if(!ROSTER[r.fromId])ROSTER[r.fromId]={};if(!ROSTER[r.toId])ROSTER[r.toId]={};
  ROSTER[r.fromId][di]=ts;ROSTER[r.toId][di]=fs;
  fbw("roster/"+r.fromId+"/"+di,ts);fbw("roster/"+r.toId+"/"+di,fs);
  addN("Swap approved: "+r.from+" and "+r.to);rSwap();
}

function dnSwap(id){
  var r=swaps.find(function(x){return x.id===id;});
  if(r){r.status="denied";fbw("swaps/"+id+"/status","denied");}rSwap();
}

  var id="sw"+Date.now();
  var req={id:id,fromId:curId,from:cs.name,toId:toId,to:ts.name,day:day,shift:(ROSTER[curId]&&ROSTER[curId][di])||"OFF",reason:document.getElementById("sw-rsn").value,status:"pending",ts:new Date().toLocaleTimeString()};
  swaps.unshift(req);fbw("swaps/"+id,req);
  addN(cs.name+" requested swap with "+ts.name);rSwap();
}

function rReports(){
  var total=0,offC=0,staffed={},venues={};
  DAYS.forEach(function(_,di){STAFF.forEach(function(s){
    var v=(ROSTER[s.id]&&ROSTER[s.id][di])||"OFF";
    if(v==="OFF"){offC++;return;}total++;staffed[s.id]=1;
    var k=v.replace(/\s+[\d:.\-\/]+.*/,"").trim();venues[k]=(venues[k]||0)+1;
  });});
  var vr=Object.entries(venues).sort(function(a,b){return b[1]-a[1];}).slice(0,10).map(function(kv){
    return "<div style='display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:12px'>"
      +"<span>"+kv[0]+"</span><div style='display:flex;align-items:center;gap:8px'>"
      +"<div style='width:"+Math.round(kv[1]/Math.max(total,1)*100)+"px;max-width:100px;height:6px;background:#3b82f6;border-radius:3px'></div><b>"+kv[1]+"</b></div></div>";
  }).join("");
  var sr=STAFF.map(function(s){
    var sh=Object.values(ROSTER[s.id]||{}).filter(function(v){return v&&v!=="OFF";}).length;
    return "<div style='display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #f3f4f6;font-size:12px'>"
      +"<span style='min-width:80px;font-weight:500'>"+s.name+"</span>"
      +"<div style='flex:1;height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden'><div style='width:"+Math.round(sh/7*100)+"%;height:100%;background:#2563eb'></div></div>"
      +"<b>"+sh+"</b></div>";}).join("");
  var db=DS.map(function(d,di){
    var c=STAFF.filter(function(s){return ROSTER[s.id]&&ROSTER[s.id][di]&&ROSTER[s.id][di]!=="OFF";}).length;
    return "<div style='flex:1;text-align:center'><div style='font-size:10px;color:#6b7280;margin-bottom:4px'>"+d+"</div>"
      +"<div style='height:50px;background:#f3f4f6;border-radius:6px;position:relative;overflow:hidden'>"
      +"<div style='position:absolute;bottom:0;left:0;right:0;height:"+Math.round(c/Math.max(STAFF.length,1)*100)+"%;background:#3b82f6;border-radius:6px 6px 0 0'></div></div>"
      +"<div style='font-size:11px;margin-top:3px;font-weight:600'>"+c+"</div></div>";}).join("");
  pg("<div class='g4'>"
    +"<div class='met'><div class='ml'>Total shifts</div><div class='mv'>"+total+"</div></div>"
    +"<div class='met'><div class='ml'>Staff rostered</div><div class='mv'>"+Object.keys(staffed).length+"</div></div>"
    +"<div class='met'><div class='ml'>Days off</div><div class='mv'>"+offC+"</div></div>"
    +"<div class='met'><div class='ml'>Team size</div><div class='mv'>"+STAFF.length+"</div></div>"
    +"</div><div class='g2'>"
    +"<div class='card'><div class='sec'>By venue</div>"+vr+"</div>"
    +"<div class='card'><div class='sec'>By staff member</div>"+sr+"</div>"
    +"</div><div class='card'><div class='sec'>Staff per day</div><div style='display:flex;gap:6px'>"+db+"</div></div>");
}

function rExport(){
  pg("<div class='sec'>Export and Share</div>"
    +"<div class='card' style='background:#eff6ff;border-color:#bfdbfe'>"
    +"<div style='font-size:13px;font-weight:600;color:#1d4ed8;margin-bottom:4px'>Your app link</div>"
    +"<div style='font-size:12px;color:#1d4ed8;word-break:break-all'>"+window.location.href+"</div>"
    +"<button class='btn btp' style='margin-top:8px' onclick='cpLink()'>Copy link</button></div>"
    +"<div class='eopt' onclick='expCSV()'><div style='display:flex;align-items:center;gap:12px'>"
    +"<div style='width:36px;height:36px;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:18px'>CSV</div>"
    +"<div><div style='font-size:13px;font-weight:600'>Export as CSV</div><div style='font-size:11px;color:#6b7280'>Download for Excel or Sheets</div></div>"
    +"</div><span>></span></div>"
    +"<div class='eopt' onclick='sendEmails(STAFF.filter(function(s){return s.email&&s.email.indexOf(\"@\")>=0;}))'>"
    +"<div style='display:flex;align-items:center;gap:12px'>"
    +"<div style='width:36px;height:36px;border-radius:8px;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:18px'>@</div>"
    +"<div><div style='font-size:13px;font-weight:600'>Email roster to all staff</div><div style='font-size:11px;color:#6b7280'>Sends personal shifts to each person</div></div>"
    +"</div><span>></span></div>"
    +"<div class='eopt' onclick='window.print()'><div style='display:flex;align-items:center;gap:12px'>"
    +"<div style='width:36px;height:36px;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:18px'>P</div>"
    +"<div><div style='font-size:13px;font-weight:600'>Print roster</div><div style='font-size:11px;color:#6b7280'>Print-friendly view</div></div>"
    +"</div><span>></span></div>");
}

function expCSV(){
  var rows=[["Staff","Role"].concat(DS)];
  STAFF.forEach(function(s){rows.push([s.name,s.role].concat(DAYS.map(function(_,di){return (ROSTER[s.id]&&ROSTER[s.id][di])||"OFF";})));});
  var csv=rows.map(function(r){return r.map(function(c){return '"'+c+'"';}).join(",");}).join("\n");
  var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="roster_churros.csv";a.click();
}

function cpLink(){
  navigator.clipboard.writeText(window.location.href).then(function(){alert("Link copied!");}).catch(function(){prompt("Copy this:",window.location.href);});
}

function addN(text){
  var n={id:"n"+Date.now(),icon:"bell",text:text,time:new Date().toLocaleTimeString(),read:false};
  notifs.unshift(n);fbw("notifications/"+n.id,n);updNB();
}

function updNB(){
  var b=document.getElementById("nbadge");
  if(b)b.style.display=notifs.filter(function(n){return !n.read;}).length?"block":"none";
}

function rNotif(){
  var rows=notifs.slice(0,20).map(function(n){
    return "<div class='nitem "+(n.read?"":"unread")+"' onclick='mkRead(\""+n.id+"\")'>"
      +"<div style='width:30px;height:30px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px'>!</div>"
      +"<div style='flex:1'><div style='font-size:12px'>"+n.text+"</div><div style='font-size:11px;color:#9ca3af;margin-top:2px'>"+n.time+"</div></div>"
      +(!n.read?"<div style='width:7px;height:7px;border-radius:50%;background:#3b82f6;flex-shrink:0;margin-top:4px'></div>":"")
      +"</div>";}).join("");
  pg("<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px'>"
    +"<span class='sec' style='margin:0'>Notifications</span>"
    +"<button class='btn' onclick='mkAllRead()' style='font-size:11px'>Mark all read</button></div>"
    +"<div class='card' style='padding:0;overflow:hidden'>"+(rows||"<div style='padding:14px;font-size:12px;color:#9ca3af'>No notifications yet.</div>")+"</div>");
}

function mkRead(id){var n=notifs.find(function(x){return x.id===id;});if(n){n.read=true;fbw("notifications/"+id+"/read",true);}updNB();rNotif();}
function mkAllRead(){notifs.forEach(function(n){n.read=true;fbw("notifications/"+n.id+"/read",true);});updNB();rNotif();}

function rClock(){
  var cs=STAFF.find(function(s){return s.id===curId;});if(!cs)return;
  var myS=DAYS.map(function(d,di){return {d:d,v:(ROSTER[curId]&&ROSTER[curId][di])||"OFF"};}).filter(function(x){return x.v!=="OFF";});
  var sr=myS.map(function(x){return "<div style='display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#f9fafb;border-radius:8px;margin-bottom:6px;font-size:12px'><span style='font-weight:500'>"+x.d+"</span><span class='badge "+sc(x.v)+"'>"+x.v+"</span></div>";}).join("");
  var lr=clog.slice().reverse().map(function(e){return "<div class='loge'><span>"+e.type+"</span><span>"+e.time+(e.hrs?" ("+e.hrs+"h)":"")+"</span></div>";}).join("");
  pg("<div class='g2'><div>"
    +"<div class='card' style='text-align:center'>"
    +"<div style='font-size:12px;color:#6b7280;margin-bottom:2px'>Current time</div>"
    +"<div class='clkdisp' id='lclk'>--:--:--</div>"
    +"<div style='font-size:12px;color:#6b7280;margin-bottom:12px' id='ldate'></div>"
    +"<div style='font-size:12px;color:#6b7280;margin-bottom:12px'>"+(clkIn?(onBrk?"On break":"Clocked in")+" since "+(clkTime?clkTime.toLocaleTimeString():""):"Not clocked in")+"</div>"
    +"<button class='pb "+(clkIn?"pcout":"pcin")+"' onclick='punch()'>"+(clkIn?"Clock Out":"Clock In")+"</button>"
    +"<button class='pb pbrk' onclick='punchBrk()' style='display:"+(clkIn?"block":"none")+"'>"+(onBrk?"End Break":"Start Break")+"</button>"
    +"</div>"
    +"<div class='g2' style='grid-template-columns:1fr 1fr'>"
    +"<div class='met'><div class='ml'>Hours this week</div><div class='mv'>"+parseFloat(wHrs).toFixed(1)+"</div></div>"
    +"<div class='met'><div class='ml'>Shifts done</div><div class='mv'>"+wShifts+"</div></div>"
    +"</div></div>"
    +"<div>"
    +"<div class='card'><div class='sec'>My shifts</div>"+(sr||"<div style='font-size:12px;color:#9ca3af'>No shifts.</div>")+"</div>"
    +"<div class='card'><div class='sec'>Clock log</div><div class='hlog'>"+(lr||"<div style='font-size:12px;color:#9ca3af'>No entries yet.</div>")+"</div></div>"
    +"</div></div>");
  updClk();
}

function updClk(){
  var lc=document.getElementById("lclk");if(!lc){if(clkTmr)clearTimeout(clkTmr);return;}
  var now=new Date();lc.textContent=now.toLocaleTimeString();
  var ld=document.getElementById("ldate");if(ld)ld.textContent=now.toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"});
  clkTmr=setTimeout(updClk,1000);
}

function punch(){pendPunch=clkIn?"out":"in";openCam();}

function openCam(){
  document.getElementById("camtit").textContent=pendPunch==="in"?"Take photo to Clock In":"Take photo to Clock Out";
  document.getElementById("camprev").style.display="none";
  document.getElementById("cambtns").style.display="block";
  document.getElementById("camconf").style.display="none";
  document.getElementById("camerr").style.display="none";
  capPhoto=null;
  om("m-cam");
  var video=document.getElementById("camvid");
  navigator.mediaDevices.getUserMedia({video:{facingMode:"user"},audio:false}).then(function(stream){
    camStream=stream;video.srcObject=stream;
  }).catch(function(){
    video.style.display="none";
    document.getElementById("cambtns").style.display="none";
    document.getElementById("camerr").style.display="block";
  });
}

function takePic(){
  var video=document.getElementById("camvid");
  var canvas=document.getElementById("camcvs");
  canvas.width=video.videoWidth||320;canvas.height=video.videoHeight||240;
  canvas.getContext("2d").drawImage(video,0,0);
  capPhoto=canvas.toDataURL("image/jpeg",0.6);
  document.getElementById("camimg").src=capPhoto;
  document.getElementById("camprev").style.display="block";
  document.getElementById("cambtns").style.display="none";
  document.getElementById("camconf").style.display="block";
}

function retakePic(){
  document.getElementById("camprev").style.display="none";
  document.getElementById("cambtns").style.display="block";
  document.getElementById("camconf").style.display="none";
  capPhoto=null;
}

function cancelCam(){stopCam();cm("m-cam");}
function skipCam(){stopCam();cm("m-cam");doPunch(null);}
function confirmCam(){stopCam();cm("m-cam");doPunch(capPhoto);}
function stopCam(){if(camStream){camStream.getTracks().forEach(function(t){t.stop();});camStream=null;}}

function doPunch(photo){
  if(pendPunch==="in"){
    clkIn=true;onBrk=false;clkTime=new Date();
    var cs=STAFF.find(function(s){return s.id===curId;});if(cs)cs.status="working";
    fbw("staff/"+curId+"/status","working");
    clog.push({type:"Clock in",time:clkTime.toLocaleTimeString(),photo:photo||""});
    fbw("clocklog/"+curId+"/"+Date.now(),{type:"Clock in",time:clkTime.toISOString(),photo:photo||""});
    wShifts++;
  } else {
    var now=new Date();var hrs=((now-clkTime)/3600000).toFixed(2);
    wHrs=(parseFloat(wHrs)+parseFloat(hrs)).toFixed(2);
    clkIn=false;onBrk=false;
    var cs2=STAFF.find(function(s){return s.id===curId;});if(cs2)cs2.status="off";
    fbw("staff/"+curId+"/status","off");
    clog.push({type:"Clock out",time:now.toLocaleTimeString(),hrs:hrs,photo:photo||""});
    fbw("clocklog/"+curId+"/"+Date.now(),{type:"Clock out",time:now.toISOString(),hours:hrs,photo:photo||""});
  }
  pendPunch=null;rClock();
}

function punchBrk(){
  onBrk=!onBrk;
  var cs=STAFF.find(function(s){return s.id===curId;});if(cs)cs.status=onBrk?"break":"working";
  fbw("staff/"+curId+"/status",onBrk?"break":"working");
  clog.push({type:onBrk?"Break start":"Break end",time:new Date().toLocaleTimeString()});
  rClock();
}

function rAvail(){
  var av=avail[curId]||{};
  var days=DS.map(function(d,i){
    var val=av[i]||"yes";
    return "<div class='avday av-"+val+"' onclick='cycAv("+i+")'>"
      +"<div style='font-weight:600;font-size:12px'>"+d.split(" ")[0]+"</div>"
      +"<div style='font-size:10px;margin-top:2px'>"+d.split(" ")[1]+"</div>"
      +"<div style='margin-top:5px;font-size:14px'>"+(val==="yes"?"Yes":val==="no"?"No":"Maybe")+"</div>"
      +"</div>";}).join("");
  pg("<div class='sec'>My availability - week of 18-24 May</div>"
    +"<div style='display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;font-size:12px'>"
    +"<span style='padding:3px 10px;background:#dcfce7;border:1px solid #16a34a;color:#14532d;border-radius:6px'>Yes</span>"
    +"<span style='padding:3px 10px;background:#fef3c7;border:1px solid #d97706;color:#92400e;border-radius:6px'>Maybe</span>"
    +"<span style='padding:3px 10px;background:#fee2e2;border:1px solid #dc2626;color:#7f1d1d;border-radius:6px'>No</span>"
    +"<span style='color:#9ca3af;font-size:11px'>Tap to cycle</span></div>"
    +"<div class='avgrid'>"+days+"</div>"
    +"<div style='display:flex;gap:8px;flex-wrap:wrap'>"
    +"<button class='btn btg' onclick='svAv()'>Save and send</button>"
    +"<button class='btn' onclick='setAllAv(\"yes\")'>All available</button>"
    +"<button class='btn btd' onclick='setAllAv(\"no\")'>All unavailable</button>"
    +"</div>"
    +"<div class='card' style='margin-top:12px'><div class='sec'>Notes for manager</div>"
    +"<div class='fg'><textarea id='av-notes' placeholder='Any notes...' style='min-height:70px;resize:vertical'></textarea></div>"
    +"<button class='btn btp' onclick='svAv()'>Submit to manager</button></div>");
}

function cycAv(i){
  if(!avail[curId])avail[curId]={};
  var c={yes:"maybe",maybe:"no",no:"yes"};
  avail[curId][i]=c[avail[curId][i]||"yes"];rAvail();
}

function setAllAv(val){if(!avail[curId])avail[curId]={};DAYS.forEach(function(_,i){avail[curId][i]=val;});rAvail();}
function svAv(){fbw("availability/"+curId,avail[curId]);addN("Availability submitted");alert("Availability saved!");}

function rMysch(){
  var cs=STAFF.find(function(s){return s.id===curId;});if(!cs)return;
  var dm={1:0,2:1,3:2,4:3,5:4,6:5,0:6};var ti=dm[new Date().getDay()];
  var sh=Object.values(ROSTER[curId]||{}).filter(function(v){return v&&v!=="OFF";}).length;
  var vns=[...new Set(Object.values(ROSTER[curId]||{}).filter(function(v){return v&&v!=="OFF";}).map(function(v){return v.replace(/\s+[\d:.\-\/]+.*/,"").trim();}))];
  var rows=DAYS.map(function(d,di){
    var v=(ROSTER[curId]&&ROSTER[curId][di])||"OFF";
    var isTd=di===ti;
    return "<div class='schday "+(isTd?"today":"")+"'>"
      +"<div><div style='font-size:13px;font-weight:600;"+(isTd?"color:#1d4ed8":"")+"'>"+d+(isTd?" - Today":"")+"</div></div>"
      +"<span class='badge "+sc(v)+"'>"+v+"</span></div>";}).join("");
  pg("<div style='display:flex;align-items:center;gap:12px;margin-bottom:16px'>"
    +"<div class='av' style='width:42px;height:42px;font-size:15px'>"+cs.name.slice(0,2).toUpperCase()+"</div>"
    +"<div><div style='font-size:16px;font-weight:700'>"+cs.name+"</div>"
    +"<div style='font-size:12px;color:#6b7280'>"+cs.role+" - "+sh+" shifts this week</div></div>"
    +"<div style='margin-left:auto'><button class='btn' onclick='expMyCal()' style='font-size:12px'>Export</button></div>"
    +"</div>"
    +"<div class='g3' style='margin-bottom:14px'>"
    +"<div class='met'><div class='ml'>Shifts</div><div class='mv'>"+sh+"</div></div>"
    +"<div class='met'><div class='ml'>Days off</div><div class='mv'>"+(7-sh)+"</div></div>"
    +"<div class='met'><div class='ml'>Venues</div><div class='mv'>"+vns.length+"</div></div>"
    +"</div><div class='sec'>My week</div>"+rows
    +"<div style='margin-top:10px;padding:10px 12px;background:#eff6ff;border-radius:8px;font-size:12px;color:#1d4ed8'>"
    +"To request changes, use the Swap Shifts tab.</div>");
}

function expMyCal(){
  var cs=STAFF.find(function(s){return s.id===curId;});
  var lines=DAYS.map(function(d,di){return d+": "+((ROSTER[curId]&&ROSTER[curId][di])||"OFF");}).join("\n");
  var a=document.createElement("a");
  a.href="data:text/plain;charset=utf-8,"+encodeURIComponent(cs.name+"'s Roster\nWeek of 18-24 May\n\n"+lines);
  a.download=cs.name.toLowerCase().replace(/ /g,"-")+"-roster.txt";a.click();
}

function showPanel(t){
  document.getElementById("lmode").style.display="none";
  document.getElementById("lpanel-mgr").style.display=t==="mgr"?"block":"none";
  document.getElementById("lpanel-stf").style.display=t==="stf"?"block":"none";
}

function buildPkr(){
  document.getElementById("spkr").innerHTML=STAFF.map(function(s){
    return "<button class='spkbtn' onclick='loginStf(\""+s.id+"\")'>" + s.name + "</button>";
  }).join("");
}

function backL(){
  pe="";spe="";updPD();updSPD();
  document.getElementById("lmode").style.display="block";
  document.getElementById("lpanel-mgr").style.display="none";
  document.getElementById("lpanel-stf").style.display="none";
  document.getElementById("stf-pin-panel").style.display="block";
  document.getElementById("stf-name-panel").style.display="none";
  document.getElementById("perr").style.display="none";
  document.getElementById("sperr").style.display="none";
}

function pp(k){
  if(k==="back")pe=pe.slice(0,-1);
  else if(k==="clear")pe="";
  else if(pe.length<4)pe+=k;
  updPD();document.getElementById("perr").style.display="none";
  if(pe.length===4){
    if(pe===MPIN){mode="manager";curId="";enterApp();}
    else{document.getElementById("perr").style.display="block";pe="";updPD();}
  }
}

function spp(k){
  if(k==="back")spe=spe.slice(0,-1);
  else if(k==="clear")spe="";
  else if(spe.length<4)spe+=k;
  updSPD();document.getElementById("sperr").style.display="none";
  if(spe.length===4){
    if(spe===SPIN){
      document.getElementById("stf-pin-panel").style.display="none";
      document.getElementById("stf-name-panel").style.display="block";
    } else {
      document.getElementById("sperr").style.display="block";spe="";updSPD();
    }
  }
}

function updPD(){for(var i=0;i<4;i++){var d=document.getElementById("pd"+i);if(d)d.className="pdot"+(i<pe.length?" filled":"");}}
function updSPD(){for(var i=0;i<4;i++){var d=document.getElementById("spd"+i);if(d)d.className="pdot"+(i<spe.length?" filled":"");}}

function loginStf(id){mode="staff";curId=id;enterApp();}

function enterApp(){
  document.getElementById("lscrn").style.display="none";
  document.getElementById("app").style.display="block";
  var cs=mode==="manager"?{name:"Manager"}:STAFF.find(function(s){return s.id===curId;});
  document.getElementById("uav").textContent=mode==="manager"?"MG":cs.name.slice(0,2).toUpperCase();
  document.getElementById("uname").textContent=mode==="manager"?"Manager":cs.name;
  buildNav();
  goTab(mode==="manager"?"roster":"mysch");
}

function logout(){
  if(clkTmr)clearTimeout(clkTmr);
  document.getElementById("app").style.display="none";
  document.getElementById("lscrn").style.display="flex";
  backL();buildPkr();
}

boot();
</script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
